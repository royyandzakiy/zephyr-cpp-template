#
# Bare C++ application config for the nRF5340 DK.
# Conventions mirror balancer-robot-fw (C++23 + full STL).
#

# Asserts
CONFIG_ASSERT=y

# Logging over the board UART console
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_PRINTK=y

# General system stacks
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_ISR_STACK_SIZE=2048

##########################
# C++ Language Support
##########################
CONFIG_CPP=y
# C++23 (a.k.a. 2b) — matches the reference project
CONFIG_STD_CPP2B=y
# Full GNU libstdc++ so STL (std::array, std::string_view, std::variant, ...) works
CONFIG_GLIBCXX_LIBCPP=y
# RTTI + a libc that backs the C++ runtime/heap
CONFIG_CPP_RTTI=y
CONFIG_NEWLIB_LIBC=y
# C++ 'new' / STL containers want a larger heap
CONFIG_HEAP_MEM_POOL_SIZE=8192

##########################
# Drivers used by this sample
##########################
CONFIG_GPIO=y
